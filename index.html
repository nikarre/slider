<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #faf5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 70px;
            padding-top: 80px;
            margin: 0;
        }
        h2 { margin: 0 0 30px; color: #333; }
        .block { text-align: center; }

        .slider {
            position: relative;
            width: 400px;
            height: 8px;
            background: #f3d4e0;
            border-radius: 4px;
            margin: 0 auto;
        }
        .fill {
            position: absolute;
            height: 100%;
            width: 50%;
            background: #ff7fa8;
            border-radius: 4px;
            pointer-events: none;
        }
        .thumb {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            background: #ff5e92;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .value {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #a3e3a0;
            color: #1f4d1c;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 14px;
        }
        .ticks {
            position: relative;
            width: 400px;
            margin: 14px auto 0;
            height: 18px;
        }
        .ticks span {
            position: absolute;
            transform: translateX(-50%);
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="block">
        <h2>Слайдер</h2>
        <div class="slider" id="slider1">
            <div class="fill"></div>
            <div class="thumb"><div class="value">50</div></div>
        </div>
    </div>

    <div class="block">
        <h2>Слайдер с делениями</h2>
        <div class="slider" id="slider2">
            <div class="fill"></div>
            <div class="thumb"><div class="value">40</div></div>
        </div>
        <div class="ticks">
            <span style="left:0%">0</span>
            <span style="left:20%">20</span>
            <span style="left:40%">40</span>
            <span style="left:60%">60</span>
            <span style="left:80%">80</span>
            <span style="left:100%">100</span>
        </div>
    </div>

<script>
function setupSlider(slider, step) {
    const fill = slider.querySelector(".fill");
    const thumb = slider.querySelector(".thumb");
    const value = slider.querySelector(".value");
    let isDragging = false;

    function move(clientX) {
        const rect = slider.getBoundingClientRect();
        let pos = clientX - rect.left;
        if (pos < 0) pos = 0;
        if (pos > rect.width) pos = rect.width;

        let val = pos / rect.width * 100;
        if (step > 0) {
            val = Math.round(val / step) * step;
        } else {
            val = Math.round(val);
        }

        const percent = val + "%";
        thumb.style.left = percent;
        fill.style.width = percent;
        value.textContent = val;
    }

    function slide(e) {
        switch (e.type) {
            case "mousedown":
                isDragging = true;
                move(e.clientX);
                break;
            case "mousemove":
                if (isDragging) move(e.clientX);
                break;
            case "mouseup":
                isDragging = false;
                break;
        }
    }

    slider.addEventListener("mousedown", slide);
    document.addEventListener("mousemove", slide);
    document.addEventListener("mouseup", slide);
}

setupSlider(document.getElementById("slider1"), 0);
setupSlider(document.getElementById("slider2"), 20);
</script>
</body>
</html>
