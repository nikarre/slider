<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .slider {
            position: relative;
            width: 400px;
            height: 8px;
            background: #f3d4e0;
            border-radius: 4px;
        }
        .fill {
            position: absolute;
            height: 100%;
            width: 50%;
            background: #ff7fa8;
            border-radius: 4px;
            pointer-events: none;
        }
        .thumb {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            background: #ff5e92;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .value {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: #a3e3a0;
            color: #1f4d1c;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="slider">
        <div class="fill"></div>
        <div class="thumb"><div class="value">50</div></div>
    </div>
</body>
<script>
const slider = document.querySelector(".slider");
const fill = document.querySelector(".fill");
const thumb = document.querySelector(".thumb");
const value = document.querySelector(".value");
let isDragging = false;

function move(el, x) {
    if (x < 0) x = 0;
    if (x > el.offsetWidth) x = el.offsetWidth;
    const percent = x / el.offsetWidth;
    thumb.style.left = percent * 100 + "%";
    fill.style.width = percent * 100 + "%";
    value.textContent = Math.round(percent * 100);
}

function slide(e) {
    switch (e.type) {
        case "mousedown":
            isDragging = true;
            move(e.currentTarget, e.offsetX);
            break;
        case "mouseup":
            isDragging = false;
            break;
        case "mousemove":
            if (isDragging) {
                move(e.currentTarget, e.offsetX);
            }
            break;
    }
}

slider.addEventListener("mousedown", slide);
slider.addEventListener("mouseup", slide);
slider.addEventListener("mousemove", slide);
</script>
</html>
